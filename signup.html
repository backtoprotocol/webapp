<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Back to Protocol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; color: #1c1917; background-color: #fafaf9; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        header { background: white; border-bottom: 1px solid #e7e5e4; }
        .header-content { display: flex; align-items: center; height: 80px; }
        .logo { font-size: 24px; font-weight: bold; color: #4a5ba4; text-decoration: none; }
        .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .form-container { width: 100%; max-width: 400px; }
        h1 { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        p { color: #44403c; margin-bottom: 32px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #e7e5e4; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #4a5ba4; }
        button { width: 100%; padding: 12px; background-color: #4a5ba4; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        button:hover { background-color: #3d4a89; }
        .google-btn { background-color: transparent; border: 2px solid #e7e5e4; color: #1c1917; margin-top: 24px; }
        .google-btn:hover { background-color: #f5f5f4; }
        .signin-link { text-align: center; margin-top: 24px; color: #44403c; }
        .signin-link a { color: #4a5ba4; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">Back to Protocol</a>
            </div>
        </div>
    </header>

    <div class="page">
        <div class="form-container">
            <h1>Create Account</h1>
            <p>Join our community</p>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Create Account</button>
                <button type="button" class="google-btn">Sign up with Google</button>
            </form>
            <div class="signin-link">
                Already have an account? <a href="signin.html">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
