<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Back to Protocol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; color: #1c1917; background-color: #fafaf9; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        header { background: white; border-bottom: 1px solid #e7e5e4; }
        .header-content { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-size: 24px; font-weight: bold; color: #4a5ba4; text-decoration: none; }
        .btn { padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
        .btn-primary { background-color: #4a5ba4; color: white; }
        .btn-outline { border: 2px solid #4a5ba4; color: #4a5ba4; background: transparent; }
        .page { min-height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 64px 20px; }
        .form-container { max-width: 500px; }
        h1 { font-size: 32px; font-weight: bold; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1c1917; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e7e5e4; border-radius: 8px; font-size: 14px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; ring: 2px #4a5ba4; }
        button { margin-top: 16px; }
        footer { background-color: #1c1917; color: #e8e8e8; padding: 32px 20px; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="container">
                <div class="header-content">
                    <a href="/" class="logo">Back to Protocol</a>
                </div>
            </div>
        </header>

        <div class="content">
            <div class="container">
                <div class="form-container">
                    <h1>Contact Us</h1>
                    <form>
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2024 Back to Protocol. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
